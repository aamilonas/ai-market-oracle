name: Morning — Generate Predictions

on:
  schedule:
    # 12:30 UTC = 8:30 AM EDT / 7:30 AM EST — always before 9:30 AM market open.
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate predictions for (YYYY-MM-DD, default: today)'
        required: false
      models:
        description: 'Comma-separated model slugs (default: all)'
        required: false
      overwrite:
        description: 'Overwrite existing prediction files for the selected date'
        required: false
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate predictions
        id: generate
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          MODELS="${{ github.event.inputs.models || '' }}"
          ARGS=""
          if [ -n "$DATE" ]; then ARGS="$ARGS --date $DATE"; fi
          if [ -n "$MODELS" ]; then ARGS="$ARGS --models $MODELS"; fi
          if [ "${{ github.event.inputs.overwrite || 'false' }}" = "true" ]; then ARGS="$ARGS --overwrite"; fi
          python generate.py $ARGS

      - name: Generate daily summary
        id: daily_summary
        continue-on-error: true
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          ARGS=""
          if [ -n "$DATE" ]; then ARGS="--date $DATE"; fi
          python summarize.py --daily $ARGS

      - name: Sync data to public (ensure latest)
        run: |
          mkdir -p public/data
          cp -r data/predictions public/data/
          cp -r data/summaries public/data/
          cp data/leaderboard.json public/data/leaderboard.json 2>/dev/null || true
          cp data/simulator.json public/data/simulator.json 2>/dev/null || true
          cp data/winner-today.json public/data/winner-today.json 2>/dev/null || true

      - name: Build frontend
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "AI Market Oracle Bot"
          git config user.email "bot@ai-market-oracle.github.io"
          git add data/ public/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "🤖 Morning predictions — $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push origin master

      - name: Health check — fail if generation or summary failed
        if: always()
        run: |
          ERRORS=""
          FAILED="${{ steps.generate.outputs.failed_models }}"
          if [ -n "$FAILED" ]; then
            ERRORS="${ERRORS}Models failed to generate predictions: $FAILED. "
          fi
          if [ "${{ steps.daily_summary.conclusion }}" = "failure" ]; then
            ERRORS="${ERRORS}Daily summary step failed. "
          fi
          if [ -n "$ERRORS" ]; then
            echo "::error::${ERRORS}Check logs above for details."
            exit 1
          fi
          echo "All morning steps completed successfully."
