<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ai-market-oracle/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="5 AI models analyze the market every morning. When 3+ agree, we trade for you. AI-powered consensus trading." />
    <meta property="og:title" content="Oracle Trade" />
    <meta property="og:description" content="5 AI models. One consensus. Auto-traded." />
    <meta property="og:type" content="website" />
    <title>Oracle Trade</title>
    <script>
      // Set theme before React mounts to avoid a flash of wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('oracle-trade-theme');
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
